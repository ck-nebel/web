<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aula 17 - Projeto Prático (Quiz PT-BR)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .opcao { display: block; width: 100%; text-align: left; background: var(--bg-dark); }
    .opcao.correta { background-color: var(--success) !important; color: white; }
    .opcao.errada { background-color: var(--danger) !important; color: white; }
  </style>
</head>
<body>
  <div class="container" id="app">
    
    <div id="inicio">
      <h1>Quiz JavaScript</h1>
      <button id="btnIniciar">Iniciar Quiz</button>
    </div>

    <div id="quiz" hidden>
      <div id="progresso" style="color: var(--text-muted); margin-bottom: 10px;"></div>
      <h2 id="pergunta">Carregando...</h2>
      <div id="opcoes"></div>
    </div>

    <div id="resultado" hidden></div>

  </div>

  <script>
    const elInicio = document.querySelector('#inicio');
    const elQuiz = document.querySelector('#quiz');
    const elResultado = document.querySelector('#resultado');
    const elProgresso = document.querySelector('#progresso');
    const elPergunta = document.querySelector('#pergunta');
    const elOpcoes = document.querySelector('#opcoes');
    const btnIniciar = document.querySelector('#btnIniciar');

    let perguntas = [];
    let atual = 0;
    let pontos = 0;
    let aguardandoResposta = false;

    async function buscarPerguntas() {
      const url = 'https://tryvia.ptr.red/api.php?amount=5&type=multiple';
      try {
        const res = await fetch(url);
        const data = await res.json();
        perguntas = data.results;
        exibirPergunta();
      } catch (erro) {
        elPergunta.textContent = 'Erro ao carregar perguntas da API.';
        console.error('Falha no Fetch:', erro);
      }
    }

    function embaralhar(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function getAlternativas(pergunta) {
      const todas = [...pergunta.incorrect_answers, pergunta.correct_answer];
      return embaralhar(todas);
    }

    function exibirPergunta() {
      aguardandoResposta = false;
      const p = perguntas[atual];
      const alternativas = getAlternativas(p);

      elProgresso.textContent = `Pergunta ${atual + 1} de ${perguntas.length}`;
      elPergunta.innerHTML = p.question;

      elOpcoes.innerHTML = '';
      
      alternativas.forEach((alt) => {
        const btn = document.createElement('button');
        btn.innerHTML = alt;
        btn.className = 'opcao';
        elOpcoes.appendChild(btn);
      });
    }

    function exibirResultado() {
      elQuiz.hidden = true;
      elResultado.hidden = false;
      const pct = Math.round((pontos / perguntas.length) * 100);

      let msg = 'Tente novamente!';
      if (pct >= 80) msg = 'Excelente!';
      else if (pct >= 60) msg = 'Bom trabalho!';

      elResultado.innerHTML = `
        <h2>${msg}</h2>
        <p>Você acertou ${pontos} de ${perguntas.length} (${pct}%)</p>
        <button id="btnReiniciar">Jogar Novamente</button>
      `;

      document.querySelector('#btnReiniciar').addEventListener('click', () => {
        atual = 0;
        pontos = 0;
        elResultado.hidden = true;
        elInicio.hidden = false;
      });
    }

    elOpcoes.addEventListener('click', (e) => {
      if (!e.target.classList.contains('opcao') || aguardandoResposta) return;
      aguardandoResposta = true;

      const respostaClicada = e.target.innerHTML;
      const respostaCorreta = perguntas[atual].correct_answer;

      if (respostaClicada === respostaCorreta) {
        pontos++;
        e.target.classList.add('correta');
      } else {
        e.target.classList.add('errada');
        Array.from(elOpcoes.children).forEach(btn => {
          if (btn.innerHTML === respostaCorreta) {
            btn.classList.add('correta');
          }
        });
      }

      setTimeout(() => {
        atual++;
        if (atual < perguntas.length) {
          exibirPergunta();
        } else {
          exibirResultado();
        }
      }, 1500);
    });

    btnIniciar.addEventListener('click', () => {
      elInicio.hidden = true;
      elQuiz.hidden = false;
      buscarPerguntas();
    });
  </script>
</body>
</html>

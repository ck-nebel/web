<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <nav>
            <div class="logo">LogoFlex</div>
            <div class="links">
                <a href="#">Home</a>
                <a href="#">Sobre</a>
            </div>
        </nav>

        <section class="hero">
            <h1>Bem-vindo ao Flexbox</h1>
        </section>

        <div class="layout-principal">
            <aside class="sidebar">
                <p>Menu Lateral</p>
            </aside>
            <main class="conteudo">
                <div class="cards-section">
                    <div class="card">Item A</div>
                    <div class="card">Item B</div>
                    <div class="card">Item C</div>
                    <div class="card">Item D</div>
                </div>
            </main>
        </div>

        <footer>
            <p>Rodapé no final da página</p>
        </footer>
    </div>
</body>
</html>
